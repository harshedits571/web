<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">Reset Your Password</title>
    <script src="assets/libs/tailwind.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050505;
            color: #ffffff;
            min-height: screen;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: none; /* Hide default cursor */
        }

        a, button, input, [role="button"] {
            cursor: none !important;
        }

        /* ___ Custom Cursor Styling ___ */
        .cursor-dot,
        .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            border-radius: 50%;
            z-index: 10005;
            pointer-events: none;
            will-change: transform;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: white;
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: width 0.2s, height 0.2s, background-color 0.2s, opacity 0.3s;
        }

        body.hovering .cursor-outline {
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.1);
            border-color: transparent;
            backdrop-filter: blur(2px);
        }

        #mouse-follower {
            position: fixed;
            top: 0;
            left: 0;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            opacity: 0;
            transition: opacity 0.5s ease-out;
            will-change: transform;
        }

        .glass-card {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .gradient-text {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
            transition: all 0.3s ease;
        }

        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #a855f7;
            background: rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <!-- UI Elements -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div id="mouse-follower"></div>

    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold tracking-tighter mb-2"><span id="logo-part-1">Softwhere</span><span id="logo-part-2" class="gradient-text">Hub</span></h1>
            <p class="text-gray-400 text-sm">Secure Password Reset</p>
        </div>

        <div class="glass-card rounded-3xl p-8 relative overflow-hidden">
            <div id="reset-container">
                <div class="flex justify-center mb-6">
                    <div class="w-16 h-16 bg-purple-500/10 rounded-full flex items-center justify-center">
                        <i class="fas fa-shield-alt text-purple-400 text-2xl"></i>
                    </div>
                </div>

                <h2 class="text-2xl font-bold text-center mb-6">Create New Password</h2>

                <form id="reset-form" class="space-y-6">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-400 text-xs font-semibold uppercase tracking-widest mb-2 ml-1">New Password</label>
                            <input type="password" id="new-password" required minlength="6"
                                class="input-field w-full rounded-2xl py-4 px-6 text-white outline-none"
                                placeholder="Min 6 characters">
                        </div>
                        <div>
                            <label class="block text-gray-400 text-xs font-semibold uppercase tracking-widest mb-2 ml-1">Confirm Password</label>
                            <input type="password" id="confirm-password" required minlength="6"
                                class="input-field w-full rounded-2xl py-4 px-6 text-white outline-none"
                                placeholder="Re-enter password">
                        </div>
                    </div>

                    <button type="submit" class="w-full gradient-btn py-4 rounded-xl font-bold text-white text-lg mt-4">
                        Reset Password
                    </button>
                </form>

                <div id="message" class="hidden mt-6 p-4 rounded-xl text-center text-sm"></div>
            </div>

            <!-- Loading State -->
            <div id="loading-overlay" class="absolute inset-0 bg-[#050505]/80 backdrop-blur-md flex flex-col items-center justify-center z-50 hidden">
                <div class="w-12 h-12 border-4 border-purple-500/30 border-t-purple-500 rounded-full animate-spin mb-4"></div>
                <p class="text-white font-medium">Processing...</p>
            </div>
        </div>

        <div class="text-center mt-8">
            <a href="auth.html" class="text-gray-500 hover:text-purple-400 text-sm transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Back to Login
            </a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="auth.js"></script>
    
    <!-- Site Identity Sync -->
    <script>
        // Sync Branding from Firebase
        function initializeSiteIdentity() {
            // 'database' is defined globally in auth.js
            const db = firebase.database();
            db.ref('settings/global').on('value', (snapshot) => {
                const settings = snapshot.val();
                if (settings) {
                    const part1 = settings.siteNamePart1 || 'Softwhere';
                    const part2 = settings.siteNamePart2 || 'Hub';
                    const logo1 = document.getElementById('logo-part-1');
                    const logo2 = document.getElementById('logo-part-2');
                    if (logo1) logo1.textContent = part1;
                    if (logo2) logo2.textContent = part2;
                    document.title = `Reset Password - ${part1}${part2}`;
                }
            });
        }

        // Custom Cursor Logic
        function initCursor() {
            const cursorDot = document.querySelector('.cursor-dot');
            const cursorOutline = document.querySelector('.cursor-outline');
            const mouseFollower = document.getElementById('mouse-follower');

            if (!cursorDot || !cursorOutline) return;

            let mouseX = 0, mouseY = 0;
            let outlineX = 0, outlineY = 0;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;

                cursorDot.style.opacity = '1';
                cursorOutline.style.opacity = '1';
                if (mouseFollower) mouseFollower.style.opacity = '1';

                cursorDot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
                if (mouseFollower) {
                    mouseFollower.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
                }
            }, { passive: true });

            function animate() {
                outlineX += (mouseX - outlineX) * 0.15;
                outlineY += (mouseY - outlineY) * 0.15;
                cursorOutline.style.transform = `translate3d(${outlineX}px, ${outlineY}px, 0) translate(-50%, -50%)`;
                requestAnimationFrame(animate);
            }
            animate();

            // Hover effects
            const interactables = 'a, button, input, .glass-card, .tab-btn';
            document.body.addEventListener('mouseover', (e) => {
                if (e.target.closest(interactables)) {
                    document.body.classList.add('hovering');
                }
            });
            document.body.addEventListener('mouseout', (e) => {
                if (e.target.closest(interactables)) {
                    document.body.classList.remove('hovering');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initializeSiteIdentity();
            initCursor();
        });
    </script>

    <script>
        const resetForm = document.getElementById('reset-form');
        const messageDiv = document.getElementById('message');
        const loading = document.getElementById('loading-overlay');

        // 1. Get the action code from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const actionCode = urlParams.get('oobCode');

        if (mode !== 'resetPassword' || !actionCode) {
            showMessage("Invalid or expired reset link. Please request a new one.", "error");
            resetForm.classList.add('hidden');
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showMessage("Passwords do not match!", "error");
                return;
            }

            loading.classList.remove('hidden');

            try {
                // Verify the password reset code is valid
                await auth.verifyPasswordResetCode(actionCode);
                // Save the new password
                await auth.confirmPasswordReset(actionCode, newPassword);
                
                showMessage("Password updated successfully! You can now log in.", "success");
                resetForm.classList.add('hidden');
                
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 3000);
            } catch (error) {
                console.error(error);
                showMessage(error.message, "error");
            } finally {
                loading.classList.add('hidden');
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.classList.remove('hidden');
            if (type === 'success') {
                messageDiv.className = "mt-6 p-4 rounded-xl text-center text-sm bg-green-500/10 border border-green-500/20 text-green-400";
            } else {
                messageDiv.className = "mt-6 p-4 rounded-xl text-center text-sm bg-red-500/10 border border-red-500/20 text-red-400";
            }
        }
    </script>
</body>
</html>
